apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: kinship-landing
  project: kinship
spec:
  build:
    type: dockerfile
    dockerfile: ./Dockerfile
  runtime:
    port: 3001
    replicas: 1
  healthCheck:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  env:
    - name: NODE_ENV
      value: production
  domains:
    - name: kinship.madfam.io
      environment: production
      tlsEnabled: true
